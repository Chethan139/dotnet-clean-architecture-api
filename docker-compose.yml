version: "3.9"

services:
  # -------------------------------------------------------
  # SQL Server
  # -------------------------------------------------------
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskmanagement_sqlserver
    environment:
      SA_PASSWORD: "YourStrong@Passw0rd"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -Q 'SELECT 1' || exit 1"
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - taskmanagement_network

  # -------------------------------------------------------
  # API
  # -------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanagement_api
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=TaskManagementDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=true;"
      JwtSettings__SecretKey: "ThisIsAVeryLongSecretKeyThatShouldBeChangedInProductionAndStoredSecurely!!"
      JwtSettings__Issuer: "TaskManagementAPI"
      JwtSettings__Audience: "TaskManagementClients"
      JwtSettings__ExpiryMinutes: "60"
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - taskmanagement_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  sqlserver_data:
    driver: local

networks:
  taskmanagement_network:
    driver: bridge
